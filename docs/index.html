<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>점심 추천</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">GitHub Pages + Google Sheets</p>
        <h1>점심 추천</h1>
        <p id="config-info" class="hero-copy">오늘 점심 데이터를 불러오는 중입니다.</p>

        <section class="settings-panel">
          <div class="settings-header">
            <h2>설정</h2>
            <span id="generated-at" class="generated-at"></span>
          </div>
          <div class="settings-grid">
            <label class="field-label">
              기준 주소
              <input id="base-address-input" class="text-input" type="text" readonly />
            </label>
            <label class="field-label">
              검색 반경
              <input id="radius-input" class="text-input" type="text" readonly />
            </label>
          </div>
          <div class="action-group">
            <button class="primary-button" onclick="refreshData()">데이터 새로고침</button>
            <button id="sheet-open-btn" class="secondary-button" onclick="openSheet()">구글 시트 열기</button>
          </div>
          <div id="status-message" class="status-message"></div>
        </section>
      </header>

      <section class="weather-panel">
        <div id="weather-content" class="loading">실제 날씨 정보를 불러오는 중입니다.</div>
      </section>

      <main class="main-content">
        <section>
          <div class="section-heading">
            <h2>오늘의 추천 4곳</h2>
          </div>
          <div id="recommendations" class="recommendation-grid"></div>
        </section>

        <section class="panel">
          <h3>최근 방문 기록</h3>
          <div id="visits" class="stack-list"></div>
        </section>
      </main>
    </div>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>

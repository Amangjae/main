<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>점심 추천</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Office Lunch Picker</p>
          <h1>점심 추천</h1>
          <p id="config-info" class="hero-copy">기준 주소 정보를 불러오는 중입니다.</p>
        </div>
      </header>

      <section class="weather-panel">
        <div id="weather-content" class="loading">실제 날씨 정보를 불러오는 중입니다.</div>
      </section>

      <div class="layout">
        <main class="main-content">
          <section>
            <div class="section-heading">
              <h2>오늘의 추천 4곳</h2>
              <button class="ghost-button" onclick="refreshData()">새로고침</button>
            </div>
            <div id="recommendations" class="recommendation-grid">
              <p class="loading">추천 데이터를 불러오는 중입니다.</p>
            </div>
          </section>

          <section class="panel">
            <h3>최근 방문 기록</h3>
            <div id="visits" class="stack-list">
              <p class="loading">방문 기록을 불러오는 중입니다.</p>
            </div>
          </section>
        </main>

        <aside class="sidebar panel">
          <h3>설정</h3>
          <label class="field-label" for="base-address-input">기준 주소</label>
          <input id="base-address-input" class="text-input" type="text" placeholder="기준 주소를 입력해 주세요." />
          <button class="secondary-button" onclick="applyBaseAddress()">기준 주소 적용</button>

          <div class="action-group">
            <button id="external-api-btn" class="primary-button" onclick="connectExternalApi()">외부 API 연결</button>
            <button class="ghost-button" onclick="clearCache()">캐시 비우기</button>
          </div>

          <div id="status-message" class="status-message"></div>
        </aside>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
